<!DOCTYPE html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marek Tammets | Õhtujuht</title>
    <meta
      name="description"
      content="Marek Tammets on konkreetne ja energiline õhtujuht pulma, gala või firmaürituse jaoks. Vaata vabu aegu ja saada broneering kohe."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="single-view reveal" id="top">
        <section class="visual-panel">
          <div class="visual-stack" aria-hidden="true">
            <figure class="visual-slide is-active" data-visual-slide>
              <img class="visual-image" src="/images/1.jpg" alt="" />
            </figure>
            <figure class="visual-slide" data-visual-slide>
              <img class="visual-image" src="/images/2.jpg" alt="" />
            </figure>
            <figure class="visual-slide" data-visual-slide>
              <img class="visual-image" src="/images/3.png" alt="" />
            </figure>
          </div>
          <div class="visual-indicators" aria-hidden="true">
            <span class="visual-indicator is-active" data-visual-dot></span>
            <span class="visual-indicator" data-visual-dot></span>
            <span class="visual-indicator" data-visual-dot></span>
          </div>
          <div class="visual-overlay"></div>

          <div class="visual-copy">
            <p class="eyebrow">Õhtujuht</p>
            <h1>Marek Tammets</h1>
          </div>
        </section>

        <section class="content-panel">
          <form class="booking-form" id="booking-form">
            <div class="booking-form-intro">
              <div>
                <h2>Võta ühendust</h2>
              </div>
            </div>

            <div class="form-grid">
              <label class="field-card">
                <span class="field-label">Nimi</span>
                <input type="text" name="fullName" placeholder="Sinu nimi" required />
              </label>
              <label class="field-card">
                <span class="field-label">E-post</span>
                <input type="email" name="email" placeholder="nimi@epost.ee" required />
              </label>
              <label class="field-card">
                <span class="field-label">Telefon</span>
                <input type="tel" name="phone" placeholder="Telefoninumber" required />
              </label>
              <label class="field-card">
                <span class="field-label">Tüüp</span>
                <select name="eventType">
                  <option value="">Mis sündmus?</option>
                  <option value="pulm">Pulm</option>
                  <option value="firmaüritus">Firmaüritus</option>
                  <option value="gala">Gala</option>
                  <option value="sünnipäev">Sünnipäev</option>
                  <option value="avalik sündmus">Avalik sündmus</option>
                </select>
              </label>
              <label class="field-card">
                <span class="field-label">Külalisi</span>
                <input type="number" min="10" max="5000" name="guestCount" placeholder="Umbes mitu?" />
              </label>
              <label class="field-card">
                <span class="field-label">Kuupäev</span>
                <input type="date" name="eventDate" id="event-date" required />
              </label>
              <label class="field-card form-grid-full">
                <span class="field-label">Asukoht</span>
                <input type="text" name="location" placeholder="Kus üritus toimub?" />
              </label>
            </div>

            <div class="slot-picker">
              <div class="slot-header">
                <strong>Algusaeg</strong>
                <span id="slot-hint">Soovi korral vali aeg</span>
              </div>
              <div class="slot-list" id="slot-list"></div>
              <input type="hidden" name="timeSlot" id="time-slot" />
            </div>

            <label class="field-card field-card-note">
              <span class="field-label">Lisainfo</span>
              <textarea
                name="notes"
                rows="4"
                placeholder="Soovi korral paar sõna õhtu kohta."
              ></textarea>
            </label>

            <div class="form-actions">
              <button class="submit-button" type="submit">Saada päring</button>
              <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
            </div>
          </form>
        </section>
      </main>

    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
